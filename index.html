<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Pi AI Hub</title><script src="https://sdk.minepi.com/pi-sdk.js"></script><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>
:root{--bg:#0b1020;--panel:#11182b;--panel2:#18213a;--text:#edf2ff;--muted:#91a0bd;--line:#263250;--accent:#8b5cf6;--accent2:#22c55e}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}button,input,select,textarea{font:inherit}.app{display:grid;grid-template-columns:280px 1fr;height:100vh}.sidebar{background:#0d1425;border-left:1px solid var(--line);padding:16px;display:flex;flex-direction:column;gap:12px}.brand{font-size:20px;font-weight:800;display:flex;align-items:center;gap:9px}.logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#ec4899);display:grid;place-items:center}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:11px 14px;border-radius:12px;cursor:pointer}.btn.primary{background:var(--accent);border-color:transparent}.btn.green{background:var(--accent2);border-color:transparent}.chats{overflow:auto;flex:1}.chat-item{padding:10px;border-radius:10px;cursor:pointer;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-item.active,.chat-item:hover{background:var(--panel2);color:var(--text)}.profile{border-top:1px solid var(--line);padding-top:12px}.main{display:flex;flex-direction:column;min-width:0}.topbar{height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;background:rgba(11,16,32,.88);backdrop-filter:blur(12px)}select{background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:9px;border-radius:10px;max-width:260px}.spacer{flex:1}.messages{flex:1;overflow:auto;padding:26px max(16px,calc((100% - 850px)/2));scroll-behavior:smooth}.empty{text-align:center;margin:12vh auto;max-width:650px}.empty h1{font-size:42px;margin:0 0 10px}.suggestions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:28px}.suggestion{text-align:right}.msg{display:flex;gap:12px;margin:20px 0}.avatar{width:34px;height:34px;flex:0 0 34px;border-radius:10px;background:var(--panel2);display:grid;place-items:center}.msg.user .avatar{background:var(--accent)}.bubble{line-height:1.75;min-width:0;width:100%}.bubble pre{background:#080c17;padding:14px;border-radius:12px;overflow:auto;direction:ltr;text-align:left}.bubble code{font-family:ui-monospace,SFMono-Regular,monospace}.actions{opacity:0;display:flex;gap:7px;margin-top:7px}.msg:hover .actions{opacity:1}.composer-wrap{padding:12px max(16px,calc((100% - 850px)/2)) 22px;background:linear-gradient(transparent,var(--bg) 24%)}.composer{border:1px solid var(--line);background:var(--panel);border-radius:18px;padding:12px;box-shadow:0 14px 40px #0005}.composer textarea{width:100%;resize:none;max-height:190px;background:transparent;border:0;outline:0;color:var(--text);min-height:48px}.composer-row{display:flex;align-items:center;gap:8px}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted);cursor:pointer}.pill.on{color:white;border-color:var(--accent)}.send{margin-right:auto;width:40px;height:40px;border-radius:12px;border:0;background:var(--accent);color:white;cursor:pointer}.modal{position:fixed;inset:0;background:#0009;display:none;place-items:center;padding:20px}.modal.open{display:grid}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px;width:min(520px,100%)}.packs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.pack{border:1px solid var(--line);padding:15px;border-radius:14px;text-align:center}.muted{color:var(--muted)}.mobile-menu{display:none}@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:5;right:-290px;top:0;bottom:0;width:280px;transition:.2s}.sidebar.open{right:0}.mobile-menu{display:block}.empty h1{font-size:30px}.suggestions{grid-template-columns:1fr}.topbar{padding:0 10px}.messages{padding-top:15px}}
</style></head><body><div class="app"><aside class="sidebar" id="sidebar"><div class="brand"><span class="logo">π</span> Pi AI Hub</div><button class="btn primary" onclick="newChat()">＋ محادثة جديدة</button><div class="chats" id="chats"></div><div class="profile"><div id="profile" class="muted">غير مسجل</div><button class="btn" style="width:100%;margin-top:9px" id="loginBtn" onclick="login()">تسجيل الدخول بـ Pi</button><button class="btn green" style="width:100%;margin-top:8px" onclick="openPay()">شراء رصيد Pi</button></div></aside><main class="main"><header class="topbar"><button class="btn mobile-menu" onclick="sidebar.classList.toggle('open')">☰</button><select id="model"></select><label class="pill"><input id="temp" type="range" min="0" max="1.5" step=".1" value=".7" hidden> إبداع</label><span class="spacer"></span><span id="credits" class="muted">0 رصيد</span><button class="btn" onclick="exportChat()">تصدير</button></header><section class="messages" id="messages"></section><div class="composer-wrap"><div class="composer"><textarea id="prompt" placeholder="اكتب رسالتك هنا..." onkeydown="keySend(event)"></textarea><div class="composer-row"><span class="pill" id="webPill" onclick="toggleWeb()">🌐 بحث الويب</span><span class="muted" id="status"></span><button class="send" id="sendBtn" onclick="sendMessage()">➤</button></div></div></div></main></div>
<div class="modal" id="payModal"><div class="card"><h2>اشترِ رصيدًا بعملة Pi</h2><p class="muted">كل رسالة مكتملة تستهلك رصيدًا واحدًا.</p><div class="packs"><div class="pack"><b>100</b><p>.1 Pi</p><button class="btn primary" onclick="buy('starter')">شراء</button></div><div class="pack"><b>650</b><p>.5 Pi</p><button class="btn primary" onclick="buy('plus')">شراء</button></div><div class="pack"><b>1500</b><p>1 Pi</p><button class="btn primary" onclick="buy('pro')">شراء</button></div></div><button class="btn" style="width:100%;margin-top:14px" onclick="payModal.classList.remove('open')">إغلاق</button></div></div>
<script>
let auth=JSON.parse(localStorage.getItem('pi_ai_auth')||'null'),current=null,history=[],streaming=false,webSearch=false;const $=id=>document.getElementById(id);Pi?.init?.({version:'2.0',sandbox:false});
const api=async(url,opt={})=>{opt.headers={...(opt.headers||{}),'Content-Type':'application/json',...(auth?{Authorization:`Bearer ${auth.token}`}:{})};const r=await fetch(url,opt),d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.error||'Request failed');return d};
async function init(){const m=await api('/api/models');$('model').innerHTML=m.models.map(x=>`<option value="${x.id}">${x.name} — ${x.tag}</option>`).join('');renderEmpty();if(auth){await refreshMe();await loadChats()}}
async function login(){if(!window.Pi)return alert('افتح الموقع داخل Pi Browser');const p=await Pi.authenticate(['username','payments'],x=>console.warn(x));const d=await api('/api/pi-login',{method:'POST',body:JSON.stringify({accessToken:p.accessToken})});auth=d;localStorage.setItem('pi_ai_auth',JSON.stringify(auth));await refreshMe();await loadChats()}
async function refreshMe(){const d=await api('/api/me');$('profile').innerHTML=`@${d.user.username}`;$('credits').textContent=`${d.user.credits} رصيد`;$('loginBtn').textContent='تم تسجيل الدخول'}
async function loadChats(){const d=await api('/api/conversations');$('chats').innerHTML=d.conversations.map(c=>`<div class="chat-item ${c.id===current?'active':''}" onclick="openChat('${c.id}')">${esc(c.title)}</div>`).join('')}
async function newChat(){if(!auth)return login();const d=await api('/api/conversations',{method:'POST',body:JSON.stringify({title:'محادثة جديدة',modelId:$('model').value})});current=d.conversation.id;history=[];render();await loadChats()}
async function openChat(id){const d=await api('/api/conversations?id='+id);current=id;history=d.conversation.messages||[];$('model').value=d.conversation.model_id;render();await loadChats();sidebar.classList.remove('open')}
function renderEmpty(){$('messages').innerHTML=`<div class="empty"><div class="logo" style="margin:auto;width:58px;height:58px;font-size:28px">π</div><h1>كيف أقدر أساعدك اليوم؟</h1><p class="muted">اختر النموذج وابدأ محادثة ذكية مدفوعة بعملة Pi.</p><div class="suggestions"><button class="btn suggestion" onclick="usePrompt('اكتب لي خطة تسويق لمشروع ناشئ')">📈 خطة تسويق</button><button class="btn suggestion" onclick="usePrompt('ساعدني في كتابة كود JavaScript')">💻 مساعدة برمجية</button><button class="btn suggestion" onclick="usePrompt('لخص لي هذا النص: ')">📝 تلخيص نص</button><button class="btn suggestion" onclick="usePrompt('اعطني أفكار مشروع مربح')">💡 أفكار مشاريع</button></div></div>`}
function render(){if(!history.length)return renderEmpty();$('messages').innerHTML=history.map((m,i)=>`<div class="msg ${m.role}"><div class="avatar">${m.role==='user'?'أ':'AI'}</div><div class="bubble">${m.role==='assistant'?marked.parse(m.content||''):esc(m.content||'').replace(/\n/g,'<br>')}<div class="actions"><button class="btn" onclick="copyMsg(${i})">نسخ</button>${m.role==='assistant'?`<button class="btn" onclick="regenerate()">إعادة</button>`:''}</div></div></div>`).join('');$('messages').scrollTop=$('messages').scrollHeight}
async function sendMessage(){if(streaming)return;if(!auth)return login();let text=$('prompt').value.trim();if(!text)return;if(!current)await newChat();history.push({role:'user',content:text});history.push({role:'assistant',content:''});$('prompt').value='';render();streaming=true;$('status').textContent='جاري التفكير...';$('sendBtn').textContent='■';try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${auth.token}`},body:JSON.stringify({conversationId:current,modelId:$('model').value,messages:history.slice(0,-1),temperature:+$('temp').value,webSearch})});if(!r.ok){const d=await r.json();throw Error(d.error)}const reader=r.body.getReader(),dec=new TextDecoder();let buf='';while(true){const {done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const parts=buf.split('\n\n');buf=parts.pop();for(const part of parts){const line=part.split('\n').find(x=>x.startsWith('data:'));if(!line)continue;const d=JSON.parse(line.slice(5));if(d.type==='delta'){history[history.length-1].content+=d.text;render()}if(d.type==='error')throw Error(d.error)}}if(history.length===2){const title=text.slice(0,45);await api('/api/conversations',{method:'PATCH',body:JSON.stringify({id:current,title})})}await refreshMe();await loadChats()}catch(e){history[history.length-1].content='⚠️ '+e.message;render()}finally{streaming=false;$('status').textContent='';$('sendBtn').textContent='➤'}}
function keySend(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}function usePrompt(t){$('prompt').value=t;$('prompt').focus()}function toggleWeb(){webSearch=!webSearch;$('webPill').classList.toggle('on',webSearch)}function copyMsg(i){navigator.clipboard.writeText(history[i].content)}function regenerate(){const last=history.pop();if(history.at(-1)?.role==='user'){$('prompt').value=history.pop().content;sendMessage()}}function exportChat(){const text=history.map(m=>`${m.role==='user'?'أنت':'المساعد'}:\n${m.content}`).join('\n\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download='pi-ai-chat.txt';a.click()}function openPay(){if(!auth)return login();$('payModal').classList.add('open')}
async function buy(packageId){if(!window.Pi)return alert('افتح داخل Pi Browser');const packs={starter:{amount:.1,memo:'100 Pi AI credits'},plus:{amount:.5,memo:'650 Pi AI credits'},pro:{amount:1,memo:'1500 Pi AI credits'}},p=packs[packageId];await new Promise((resolve,reject)=>Pi.createPayment({amount:p.amount,memo:p.memo,metadata:{packageId}},{onReadyForServerApproval:async paymentId=>{try{await api('/api/payment-approve',{method:'POST',body:JSON.stringify({paymentId,packageId})})}catch(e){reject(e)}},onReadyForServerCompletion:async(paymentId,txid)=>{try{await api('/api/payment-complete',{method:'POST',body:JSON.stringify({paymentId,txid,packageId})});resolve()}catch(e){reject(e)}},onCancel:()=>reject(Error('تم إلغاء الدفع')),onError:reject}));$('payModal').classList.remove('open');await refreshMe();alert('تم إضافة الرصيد بنجاح')}
function esc(s=''){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}init();
</script></body></html>
