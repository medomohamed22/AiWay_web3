<style>
:root{--app-height:100dvh;--pi:#6f2dbd;--pi2:#8f52d6;--pi3:#f3eaff;--gold:#f4b942;--bg:#faf8fd;--surface:#fff;--surface2:#f6f1fb;--text:#21162d;--muted:#756b7f;--line:#e8ddf0;--danger:#c43d57;--ok:#15845d;--shadow:0 14px 40px rgba(75,34,112,.12);--radius:20px}*{box-sizing:border-box}html,body{width:100%;height:100%;min-height:100%;overflow:hidden}body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,"Segoe UI",system-ui,-apple-system,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}button,textarea,select,input{font:inherit}button{touch-action:manipulation}.shell{display:grid;grid-template-columns:292px minmax(0,1fr);width:100%;height:var(--app-height,100dvh);min-height:0;overflow:hidden}.sidebar{position:relative;z-index:30;display:flex;flex-direction:column;gap:14px;padding:18px;background:linear-gradient(180deg,#fff 0%,#fbf8fe 100%);border-left:1px solid var(--line);min-height:0}.brand{display:flex;align-items:center;gap:11px;padding:4px}.brand-mark{width:43px;height:43px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,var(--pi),var(--pi2));box-shadow:0 9px 22px rgba(111,45,189,.25)}.brand-mark svg{width:27px;height:27px}.brand-copy b{display:block;font-size:18px}.brand-copy small{color:var(--muted)}.icon-btn,.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;cursor:pointer;transition:.18s ease}.icon-btn{width:42px;height:42px;display:grid;place-items:center}.icon-btn svg,.btn svg,.pill svg{width:19px;height:19px}.btn{min-height:46px;padding:10px 14px;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700}.btn:hover,.icon-btn:hover{transform:translateY(-1px);border-color:#d7c0e8;box-shadow:0 7px 18px rgba(83,43,115,.09)}.btn.primary{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--pi),var(--pi2));box-shadow:0 10px 24px rgba(111,45,189,.22)}.btn.soft{background:var(--pi3);color:var(--pi);border-color:#e2cff3}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.history-title{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px;padding:0 5px}.chats{flex:1;overflow:auto;min-height:0;padding-left:3px}.chat-item{width:100%;border:0;background:transparent;color:#655b6e;padding:11px 12px;margin:3px 0;border-radius:13px;display:flex;align-items:center;gap:9px;cursor:pointer;text-align:right}.chat-item svg{width:18px;height:18px;flex:0 0 auto}.chat-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-item:hover,.chat-item.active{background:var(--pi3);color:var(--pi)}.account{border-top:1px solid var(--line);padding-top:14px}.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:15px;background:var(--surface2);margin-bottom:9px}.user-avatar{width:39px;height:39px;border-radius:13px;background:#fff;color:var(--pi);display:grid;place-items:center;font-weight:900}.user-meta{min-width:0;flex:1}.user-meta b,.user-meta small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.user-meta small{color:var(--muted);margin-top:3px}.account-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.main{min-width:0;min-height:0;height:100%;overflow:hidden;display:flex;flex-direction:column;position:relative}.topbar{height:70px;min-height:70px;flex:0 0 70px;display:flex;align-items:center;gap:10px;padding:10px 18px;background:rgba(250,248,253,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(16px);z-index:10}.mobile-menu{display:none}.model-wrap{position:relative;min-width:0}.model-wrap svg{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--pi);pointer-events:none}.model-select{height:46px;max-width:300px;width:min(300px,38vw);padding:0 42px 0 36px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);outline:0;cursor:pointer}.credits{display:flex;align-items:center;gap:7px;color:var(--pi);background:var(--pi3);padding:9px 12px;border-radius:999px;font-weight:800;white-space:nowrap}.credits svg{width:18px;height:18px}.spacer{flex:1}.messages{flex:1 1 auto;min-height:0;overflow:auto;overscroll-behavior:contain;padding:32px max(18px,calc((100% - 900px)/2)) 180px;scroll-behavior:smooth}.welcome{max-width:760px;margin:8vh auto 0;text-align:center}.hero-icon{width:78px;height:78px;margin:0 auto 20px;border-radius:27px;background:linear-gradient(145deg,var(--pi),var(--pi2));display:grid;place-items:center;box-shadow:0 18px 42px rgba(111,45,189,.24)}.hero-icon svg{width:48px;height:48px}.welcome h1{font-size:clamp(29px,5vw,48px);line-height:1.2;margin:0 0 12px}.welcome p{color:var(--muted);font-size:16px;line-height:1.9;margin:0 auto;max-width:600px}.suggestions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:30px}.suggestion{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;text-align:right;cursor:pointer;color:var(--text);display:flex;align-items:flex-start;gap:12px;min-height:86px;box-shadow:0 8px 22px rgba(80,45,103,.05)}.suggestion:hover{border-color:#ceb1e5;transform:translateY(-2px)}.suggestion .sicon{width:38px;height:38px;border-radius:12px;background:var(--pi3);color:var(--pi);display:grid;place-items:center;flex:0 0 auto}.suggestion svg{width:20px;height:20px}.suggestion b{display:block;margin-bottom:5px}.suggestion small{color:var(--muted);line-height:1.5}.msg{display:flex;gap:12px;margin:22px 0;animation:rise .2s ease}.msg.user{flex-direction:row-reverse}.avatar{width:38px;height:38px;flex:0 0 38px;border-radius:13px;display:grid;place-items:center;background:var(--pi3);color:var(--pi)}.avatar svg{width:21px;height:21px}.msg.user .avatar{background:var(--pi);color:#fff}.bubble{max-width:min(82%,760px);line-height:1.85;overflow-wrap:anywhere}.msg.user .bubble{background:linear-gradient(135deg,var(--pi),var(--pi2));color:#fff;border-radius:18px 18px 5px 18px;padding:11px 15px}.msg.assistant r(4px);z-index:50;display:none;place-items:center;padding:18px}.overlay.open{display:grid}.modal{width:min(570px,100%);max-height:90dvh;overflow:auto;background:#fff;border-radius:25px;padding:22px;box-shadow:0 24px 80px rgba(43,22,59,.25)}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.modal h2{margin:0}.modal p{color:var(--muted);line-height:1.7}.packs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:19px 0}.pack{border:1px solid var(--line);border-radius:18px;padding:16px 10px;text-align:center;background:var(--bg)}.pack.featured{border-color:#cbaaE1;background:var(--pi3)}.pack b{font-size:24px;color:var(--pi)}.pack small{display:block;color:var(--muted);margin:5px 0 12px}.toast{position:fixed;z-index:100;left:50%;bottom:24px;transform:translate(-50%,20px);background:#2b1d34;color:#fff;padding:11px 15px;border-radius:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s;max-width:min(90vw,520px);text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}.backdrop{display:none}.loading-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1s infinite}.loading-dot:nth-child(2){animation-delay:.15s}.loading-dot:nth-child(3){animation-delay:.3s}@keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}@keyframes rise{from{opacity:0;transform:translateY(6px)}}
@media(max-width:820px){.shell{grid-template-columns:1fr}.sidebar{position:fixed;right:0;top:0;bottom:0;width:min(86vw,310px);transform:translateX(105%);transition:.22s ease;box-shadow:-20px 0 50px rgba(49,24,65,.15)}.sidebar.open{transform:none}.backdrop{position:fixed;z-index:25;inset:0;background:rgba(36,19,47,.3)}.backdrop.open{display:block}.mobile-menu{display:grid}.topbar{height:64px;padding:8px 10px}.model-select{width:min(54vw,280px);height:44px}.topbar .export{display:none}.messages{padding:20px 13px 165px}.welcome{margin-top:4vh}.suggestions{grid-template-columns:1fr}.composer-zone{padding-right:10px;padding-left:10px}.bubble{max-width:88%}.account-actions{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.credits span.label{display:none}.credits{padding:9px}.model-select{width:57vw;font-size:13px}.welcome p{font-size:14px}.suggestion{min-height:76px;padding:13px}.packs{grid-template-columns:1fr}.modal{padding:18px}.pill .pill-text{display:none}.composer textarea{font-size:16px}.msg{gap:8px}.avatar{width:34px;height:34px;flex-basis:34px}.bubble{max-width:91%;font-size:14px}}

/* Stable mobile viewport and composer layout */
@supports not (height:100dvh){:root{--app-height:100vh}}
@media(max-width:820px){
  .shell{height:var(--app-height,100svh)}
  .main{height:100%;max-height:var(--app-height,100svh)}
  .topbar{min-width:0;flex:0 0 64px;min-height:64px;overflow:hidden}
  .model-wrap{flex:1 1 auto;min-width:0}
  .model-select{display:block;max-width:none;width:100%;min-width:0;padding-left:28px;text-overflow:ellipsis}
  .credits{flex:0 0 auto;max-width:104px;overflow:hidden}
  .messages{padding-bottom:calc(132px + env(safe-area-inset-bottom));scroll-padding-bottom:calc(132px + env(safe-area-inset-bottom))}
  .composer-zone{position:absolute;inset-inline:0;bottom:0;padding:28px 10px max(10px,env(safe-area-inset-bottom));pointer-events:none}
  .composer{pointer-events:auto;border-radius:20px;padding:7px 8px 7px}
  .composer textarea{min-height:44px;max-height:min(150px,28vh);padding:8px 7px}
  .composer-foot{min-width:0}
  .status{flex:1;min-width:0}
  .send{flex:0 0 42px}
  .welcome{margin:clamp(22px,4vh,48px) auto 0;padding-bottom:10px}
  .hero-icon{width:68px;height:68px;border-radius:23px;margin-bottom:16px}
  .hero-icon svg{width:41px;height:41px}
  .welcome h1{font-size:clamp(27px,8vw,38px)}
}
@media(max-width:480px){
  .topbar{gap:7px;padding-inline:8px}
  .mobile-menu{flex:0 0 44px;width:44px;height:44px}
  .credits{max-width:92px;font-size:15px}
  .model-wrap svg{right:10px}
  .model-select{font-size:13px;padding-right:36px;padding-left:24px}
  .messages{padding-inline:10px;padding-top:16px}
  .suggestions{gap:10px;margin-top:22px}
  .suggestion{min-height:72px;border-radius:16px}
  .composer-zone{padding-inline:8px}
  .composer{border-radius:18px}
}
@media(max-height:700px) and (max-width:820px){
  .welcome{margin-top:14px}
  .hero-icon{width:58px;height:58px;margin-bottom:11px;border-radius:20px}
  .hero-icon svg{width:35px;height:35px}
  .welcome h1{font-size:28px;margin-bottom:7px}
  .welcome p{line-height:1.65}
  .suggestions{margin-top:16px}
  .suggestion{min-height:66px;padding:11px}
}
</style>

<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="brand"><span class="brand-mark" id="brandIcon"></span><span class="brand-copy"><b>AiWay</b><small>ذكاء اصطناعي للجميع</small></span></div>
  <button class="btn primary" id="newChatBtn"><span data-icon="plus"></span>محادثة جديدة</button>
  <div class="history-title"><span>المحادثات</span><span data-icon="history"></span></div>
  <div class="chats" id="chats"></div>
  <div class="account">
    <div class="user-card"><span class="user-avatar" id="userAvatar">π</span><span class="user-meta"><b id="profileName">زائر</b><small id="profileState">سجّل الدخول بحساب Pi</small></span></div>
    <div class="account-actions"><button class="btn soft" id="loginBtn"><span data-icon="login"></span><span>دخول</span></button><button class="btn" id="payBtn"><span data-icon="wallet"></span><span>الرصيد</span></button></div>
  </div>
</aside>
<div class="backdrop" id="backdrop"></div>
<main class="main">
<header class="topbar">
  <button class="icon-btn mobile-menu" id="menuBtn" aria-label="القائمة"><span data-icon="menu"></span></button>
  <div class="model-wrap"><span data-icon="sparkles"></span><select class="model-select" id="model" aria-label="اختيار النموذج"></select></div>
  <div class="spacer"></div>
  <div class="credits" title="الرصيد المتاح"><span data-icon="coin"></span><span id="credits">0</span><span class="label">Token</span></div>
  <button class="icon-btn export" id="exportBtn" title="تصدير المحادثة"><span data-icon="download"></span></button>
</header>
<section class="messages" id="messages"></section>
<div class="composer-zone"><div class="composer"><textarea id="prompt" rows="1" placeholder="اسأل أي شيء..."></textarea><div class="composer-foot"><button class="pill" id="webPill"><span data-icon="globe"></span><span class="pill-text">بحث الويب</span></button><span class="status" id="status"></span><button class="send" id="sendBtn" aria-label="إرسال"><span data-icon="send"></span></button></div></div></div>
</main>
</div>
<div class="overlay" id="payModal"><div class="modal"><div class="modal-head"><h2>شراء رصيد بعملة Pi</h2><button class="icon-btn" id="closePay"><span data-icon="close"></span></button></div><p>اختر الباقة المناسبة. تُستهلك رسالة واحدة بعد اكتمال كل إجابة.</p><div class="packs"><div class="pack"><b>100</b><small>0.1 Pi</small><button class="btn primary buy" data-pack="starter">شراء</button></div><div class="pack featured"><b>650</b><small>0.5 Pi</small><button class="btn primary buy" data-pack="plus">الأفضل</button></div><div class="pack"><b>1500</b><small>1 Pi</small><button class="btn primary buy" data-pack="pro">شراء</button></div></div></div></div>
<div class="toast" id="toast"></div>
<script>
const ICONS={
 pi:'<svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" fill="white" opacity=".16"/><path d="M19 22h29M26 22v26M42 22c0 8-3 13-10 13h-6M38 35l7 13" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="14" r="3" fill="#f4b942"/><circle cx="44" cy="14" r="3" fill="#f4b942"/></svg>',

Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',stop:'<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>',close:'<svg viewBox="0 0 24 24" fill="none"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',chat:'<svg viewBox="0 0 24 24" fill="none"><path d="M20 15a3 3 0 0 1-3 3H9l-5 3v-6a3 3 0 0 1-1-2V7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',user:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',bot:'<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="7" width="16" height="13" rx="4" stroke="currentColor" stroke-width="1.7"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',copy:'<svg viewBox="0 0 24 24" fill="none"><rect x="8" y="8" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" stroke="currentColor" stroke-width="1.7"/></svg>',redo:'<svg viewBox="0 0 24 24" fill="none"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 4v7h-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'};
const $=id=>document.getElementById(id);document.getElementById('brandIcon').innerHTML=ICONS.pi;document.querySelectorAll('[data-icon]').forEach(el=>el.innerHTML=ICONS[el.dataset.icon]||'');
let auth=JSON.parse(localStorage.getItem('pi_ai_auth')||'null'),current=null,history=[],streaming=false,webSearch=false,controller=null,piReady=false,userProfile=null;
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),3200)}
async function api(url,opt={}){opt.headers={...(opt.headers||{}),'Content-Type':'application/json',...(auth?.token?{Authorization:`Bearer ${auth.token}`}:{})};const r=await fetch(url,opt);const d=await r.json().catch(()=>({}));if(!r.ok){if(r.status===401&&auth){logout(false)}throw Error(d.error||`خطأ ${r.status}`)}return d}
function initPi(){let tries=0;const timer=setInterval(()=>{tries++;if(window.Pi?.init){clearInterval(timer);try{Pi.init({version:'2.0',sandbox:false});piReady=true;$('profileState').textContent=auth?'متصل بحساب Pi':'جاهز لتسجيل الدخول'}catch(e){console.error(e)}}else if(tries>30){clearInterval(timer);$('profileState').textContent='افتح الموقع داخل Pi Browser'}},150)}
async function loadModels(){const selected=$('model').value;const d=await api('/api/models');window.aiwayPackages=d.packages||{};$('model').innerHTML=d.models.map(x=>`<option value="${esc(x.id)}" ${x.locked?'disabled':''}>${x.locked?'🔒 ':''}${esc(x.name)} — ${esc(x.tag)} | إدخال ${Number(x.pricing.inputPerMillion).toLocaleString()} / إخراج ${Number(x.pricing.outputPerMillion).toLocaleString()} توكن لكل مليون</option>`).join('');if(selected&&[...$('model').options].some(o=>o.value===selected&&!o.disabled))$('model').value=selected;renderPackages()}
async function init(){initPi();try{await loadModels()}catch(e){toast(e.message)}render();if(auth){try{await refreshMe();await loadModels();await loadChats()}catch(e){toast('انتهت الجلسة، سجّل الدخول من جديد')}}}
async function login(){if(auth)return toast('أنت مسجل بالفعل');if(!piReady||!window.Pi?.authenticate){toast('افتح الموقع من Pi Browser وانتظر تحميل Pi SDK');return}const btn=$('loginBtn');btn.disabled=true;btn.querySelector('span:last-child').textContent='جارٍ الدخول';$('profileState').innerHTML='<span class="loading-dot"></span> <span class="loading-dot"></span> <span class="loading-dot"></span>';try{const onIncompletePaymentFound=async payment=>{try{const txid=payment?.transaction?.txid;const packageId=payment?.metadata?.packageId;if(payment?.identifier&&txid&&packageId){await api('/api/payment-complete',{method:'POST',body:JSON.stringify({paymentId:payment.identifier,txid,packageId})})}}catch(e){console.warn('Incomplete payment recovery:',e)}};const result=await Pi.authenticate(['username','payments'],onIncompletePaymentFound);if(!result?.accessToken)throw Error('لم يرجع Pi رمز الدخول');const data=await api('/api/pi-login',{method:'POST',body:JSON.stringify({accessToken:result.accessToken,user:result.user||null})});auth=data;localStorage.setItem('pi_ai_auth',JSON.stringify(auth));await refreshMe();await loadModels();await loadChats();toast(userProfile?.has_purchased?'تم تسجيل الدخول بنجاح':`مرحبًا بك — لديك ${userProfile?.trial_messages_remaining||0} رسائل مجانية على DeepSeek V3`)}catch(e){console.error(e);$('profileState').textContent='تعذر تسجيل الدخول';toast(e.message||'فشل تسجيل الدخول بحساب Pi')}finally{btn.disabled=false;btn.querySelector('span:last-child').textContent=auth?'متصل':'دخول'}}
function logout(show=true){auth=null;userProfile=null;current=null;history=[];localStorage.removeItem('pi_ai_auth');$('profileName').textContent='زائر';$('profileState').textContent='سجّل الدخول بحساب Pi';$('credits').textContent='0';$('chats').innerHTML='';$('loginBtn').querySelector('span:last-child').textContent='دخول';render();if(show)toast('تم تسجيل الخروج')}
async function refreshMe(){const d=await api('/api/me');userProfile=d.user;$('profileName').textContent='@'+d.user.username;$('profileState').textContent=d.user.has_purchased?'جميع النماذج مفتوحة':`تجربة مجانية: ${d.user.trial_messages_remaining} رسائل متبقية`;$('userAvatar').textContent=(d.user.username||'π').slice(0,1).toUpperCase();$('credits').textContent=Number(d.user.ai_tokens||0).toLocaleString('en-US');$('loginBtn').querySelector('span:last-child').textContent='متصل'}
async function loadChats(){const d=await api('/api/conversations');$('chats').innerHTML=(d.conversations||[]).map(c=>`<button class="chat-item ${c.id===current?'active':''}" data-id="${c.id}">${ICONS.chat}<span>${esc(c.title)}</span></button>`).join('');$('chats').querySelectorAll('.chat-item').forEach(b=>b.onclick=()=>openChat(b.dataset.id))}
async function newChat(){if(!auth)return login();const d=await api('/api/conversations',{method:'POST',body:JSON.stringify({title:'محادثة جديدة',modelId:$('model').value})});current=d.conversation.id;history=[];render();await loadChats();closeMenu()}
async function openChat(id){try{const d=await api('/api/conversations?id='+encodeURIComponent(id));current=id;history=d.conversation.messages||[];$('model').value=d.conversation.model_id||$('model').value;render();await loadChats();closeMenu()}catch(e){toast(e.message)}}
function welcome(){return `<div class="welcome"><div class="hero-icon">${ICONS.pi}</div><h1>كيف أقدر أساعدك اليوم؟</h1><p>اختر نموذج الذكاء الاصطناعي المناسب، واسأل بالعربية أو بأي لغة. محادثاتك محفوظة بأمان في حسابك.</p><div class="suggestions"><button class="suggestion" data-prompt="اكتب لي خطة تسويق عملية لمشروع ناشئ"><span class="sicon">${ICONS.sparkles}</span><span><b>خطة تسويق</b><small>استراتيجية واضحة قابلة للتنفيذ</small></span></button><button class="suggestion" data-prompt="ساعدني في كتابة وتصحيح كود JavaScript"><span class="sicon">${ICONS.bot}</span><span><b>مساعدة برمجية</b><small>كود، شرح، وتصحيح أخطاء</small></span></button><button class="suggestion" data-prompt="لخص لي النص التالي في نقاط واضحة: "><span class="sicon">${ICONS.chat}</span><span><b>تلخيص النصوص</b><small>ملخص سريع ومنظم</small></span></button><button class="suggestion" data-prompt="اقترح أفكار مشاريع رقمية مناسبة للسوق العربي"><span class="sicon">${ICONS.coin}</span><span><b>أفكار مشاريع</b><small>فرص مبتكرة تناسب اهتماماتك</small></span></button></div></div>`}
function render(){if(!history.length){$('messages').innerHTML=welcome();$('messages').querySelectorAll('[data-prompt]').forEach(b=>b.onclick=()=>{$('prompt').value=b.dataset.prompt;$('prompt').focus();autoSize()});return}$('messages').innerHTML=history.map((m,i)=>`<article class="msg ${m.role}"><span class="avatar">${m.role==='user'?ICONS.user:ICONS.bot}</span><div class="bubble">${m.role==='assistant'?(window.marked?marked.parse(m.content||''):esc(m.content||'').replace(/\n/g,'<br>')):esc(m.content||'').replace(/\n/g,'<br>')}<div class="msg-actions"><button class="mini-btn" data-copy="${i}">${ICONS.copy} نسخ</button>${m.role==='assistant'?`<button class="mini-btn" data-redo="1">${ICONS.redo} إعادة</button>`:''}</div></div></article>`).join('');$('messages').querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copyMsg(Number(b.dataset.copy)));$('messages').querySelectorAll('[data-redo]').forEach(b=>b.onclick=regenerate);requestAnimationFrame(()=>$('messages').scrollTop=$('messages').scrollHeight)}
async function sendMessage(){if(streaming){controller?.abort();return}if(!auth)return login();const text=$('prompt').value.trim();if(!text)return;if(!current)await newChat();history.push({role:'user',content:text},{role:'assistant',content:''});$('prompt').value='';autoSize();render();streaming=true;controller=new AbortController();$('status').textContent='جاري التفكير...';$('sendBtn').innerHTML=ICONS.stop;try{const r=await fetch('/api/chat',{method:'POST',signal:controller.signal,headers:{'Content-Type':'application/json',Authorization:`Bearer ${auth.token}`},body:JSON.stringify({conversationId:current,modelId:$('model').value,messages:history.slice(0,-1),temperature:.7,webSearch})});if(!r.ok){const d=await r.json().catch(()=>({}));throw Error(d.error||'فشل إرسال الرسالة')}const reader=r.body.getReader(),decoder=new TextDecoder();let buffer='';while(true){const {done,value}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const parts=buffer.split('\n\n');buffer=parts.pop()||'';for(const part of parts){const line=part.split('\n').find(x=>x.startsWith('data:'));if(!line)continue;const d=JSON.parse(line.slice(5));if(d.type==='delta'){history[history.length-1].content+=d.text;render()}if(d.type==='error')throw Error(d.error)}}await refreshMe();await loadChats()}catch(e){if(e.name==='AbortError'){if(!history.at(-1)?.content)history.pop();toast('تم إيقاف الإجابة')}else{history.at(-1).content='حدث خطأ: '+e.message;toast(e.message)}render()}finally{streaming=false;controller=null;$('status').textContent='';$('sendBtn').innerHTML=ICONS.send}}
function regenerate(){if(streaming)return;const idx=[...history].map(x=>x.role).lastIndexOf('user');if(idx<0)return;const text=history[idx].content;history=history.slice(0,idx);$('prompt').value=text;sendMessage()}
function copyMsg(i){navigator.clipboard?.writeText(history[i]?.content||'').then(()=>toast('تم النسخ')).catch(()=>toast('تعذر النسخ'))}
function exportChat(){if(!history.length)return toast('لا توجد محادثة لتصديرها');const text=history.map(m=>`${m.role==='user'?'أنت':'AiWay'}:\n${m.content}`).join('\n\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='pi-ai-chat.txt';a.click();URL.revokeObjectURL(a.href)}
function toggleWeb(){if(userProfile&&!userProfile.has_purchased)return toast('بحث الويب يُفتح بعد أول عملية شراء');webSearch=!webSearch;$('webPill').classList.toggle('on',webSearch);toast(webSearch?'تم تفعيل بحث الويب':'تم إيقاف بحث الويب')}
function openPay(){if(!auth)return login();$('payModal').classList.add('open')}
function renderPackages(){const box=document.querySelector('.packs');if(!box||!window.aiwayPackages)return;const labels={starter:'أساسية',plus:'الأكثر توفيرًا',pro:'احترافية'};box.innerHTML=Object.entries(window.aiwayPackages).map(([id,p])=>`<div class="pack ${id==='plus'?'featured':''}"><small>${labels[id]||id}</small><b>${Number(p.tokens).toLocaleString()}</b><small>AiWay Tokens</small><button class="btn ${id==='plus'?'primary':'soft'}" onclick="buy('${id}')">$${p.usd} ≈ ${p.amountPi?Number(p.amountPi).toFixed(4):'--'} Pi</button></div>`).join('')}
async function buy(packageId){if(!auth)return login();if(!piReady||!window.Pi?.createPayment)return toast('الدفع متاح داخل Pi Browser فقط');const pkg=window.aiwayPackages?.[packageId];if(!pkg?.amountPi)return toast('تعذر جلب سعر Pi من OKX الآن');$('payModal').classList.remove('open');try{await Pi.createPayment({amount:pkg.amountPi,memo:`شراء ${pkg.tokens.toLocaleString()} AiWay Tokens بقيمة $${pkg.usd}`,metadata:{packageId,usd:pkg.usd,tokens:pkg.tokens,piUsd:pkg.piUsd}}, {onReadyForServerApproval:paymentId=>api('/api/payment-approve',{method:'POST',body:JSON.stringify({paymentId,packageId})}),onReadyForServerCompletion:async(paymentId,txid)=>{await api('/api/payment-complete',{method:'POST',body:JSON.stringify({paymentId,txid,packageId})});await refreshMe();await loadModels();toast('تمت إضافة الرصيد وفتح جميع النماذج بنجاح')},onCancel:()=>toast('تم إلغاء الدفع'),onError:e=>toast(e?.message||'حدث خطأ في الدفع')})}catch(e){toast(e.message||'تعذر بدء الدفع')}}
function autoSize(){const t=$('prompt');t.style.height='auto';t.style.height=Math.min(t.scrollHeight,180)+'px'}function closeMenu(){$('sidebar').classList.remove('open');$('backdrop').classList.remove('open')}
$('model').onchange=()=>{const o=$('model').selectedOptions[0];if(o?.disabled){$('model').value='deepseek/deepseek-chat-v3-0324';toast('هذا النموذج يُفتح بعد أول عملية شراء')}};$('newChatBtn').onclick=newChat;$('loginBtn').onclick=()=>auth?logout():login();$('payBtn').onclick=openPay;$('menuBtn').onclick=()=>{$('sidebar').classList.add('open');$('backdrop').classList.add('open')};$('backdrop').onclick=closeMenu;$('exportBtn').onclick=exportChat;$('webPill').onclick=toggleWeb;$('sendBtn').onclick=sendMessage;$('prompt').oninput=autoSize;$('prompt').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}};$('closePay').onclick=()=>$('payModal').classList.remove('open');$('payModal').onclick=e=>{if(e.target===$('payModal'))$('payModal').classList.remove('open')};document.querySelectorAll('.buy').forEach(b=>b.onclick=()=>buy(b.dataset.pack));function syncViewportHeight(){const vv=window.visualViewport;const h=vv?vv.height:window.innerHeight;document.documentElement.style.setProperty('--app-height',Math.round(h)+'px')}syncViewportHeight();window.addEventListener('resize',syncViewportHeight,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(syncViewportHeight,120),{passive:true});if(window.visualViewport){window.visualViewport.addEventListener('resize',syncViewportHeight,{passive:true});window.visualViewport.addEventListener('scroll',syncViewportHeight,{passive:true})}window.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
