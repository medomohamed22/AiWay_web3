/* Stable mobile viewport and composer layout */
@supports not (height:100dvh){:root{--app-height:100vh}}
@media(max-width:820px){
  .shell{height:var(--app-height,100svh)}
  .main{height:100%;max-height:var(--app-height,100svh)}
  .topbar{min-width:0;flex:0 0 64px;min-height:64px;overflow:hidden}
  .model-wrap{flex:1 1 auto;min-width:0}
  .model-select{display:block;max-width:none;width:100%;min-width:0;padding-left:28px;text-overflow:ellipsis}
  .credits{flex:0 0 auto;max-width:104px;overflow:hidden}
  .messages{padding-bottom:calc(132px + env(safe-area-inset-bottom));scroll-padding-bottom:calc(132px + env(safe-area-inset-bottom))}

/* AiWay interaction and performance fixes */
.model-menu{z-index:120;will-change:transform,opacity;transform:translateZ(0)}
.model-menu.open{display:block!important;pointer-events:auto}
.model-trigger{position:relative;z-index:121}
.thinking-wrap{display:flex;align-items:center;gap:7px;min-height:28px;color:var(--pi)}
.thinking-spinner{width:19px;height:19px;border:2px solid #e6d6f2;border-top-color:var(--pi);border-radius:50%;animation:spin .72s linear infinite;flex:0 0 auto}
.thinking-dots{display:flex;gap:4px;align-items:center}
.thinking-dots i{width:6px;height:6px;border-radius:50%;background:currentColor;animation:thinkingDot 1s ease-in-out infinite}
.thinking-dots i:nth-child(2){animation-delay:.14s}.thinking-dots i:nth-child(3){animation-delay:.28s}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes thinkingDot{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.send.sending{pointer-events:auto}
.pack .pi-estimate{display:block;margin:7px 0 12px;color:var(--text);font-size:13px;font-weight:800}

const ICONS={
 pi:'<svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" fill="white" opacity=".16"/><path d="M19 22h29M26 22v26M42 22c0 8-3 13-10 13h-6M38 35l7 13" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="14" r="3" fill="#f4b942"/><circle cx="44" cy="14" r="3" fill="#f4b942"/></svg>',

Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',stop:'<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>',close:'<svg viewBox="0 0 24 24" fill="none"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',chat:'<svg viewBox="0 0 24 24" fill="none"><path d="M20 15a3 3 0 0 1-3 3H9l-5 3v-6a3 3 0 0 1-1-2V7a3 3 0 0 1 3-3h11a3 3 0 0 1 3 3v8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>',user:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',bot:'<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="7" width="16" height="13" rx="4" stroke="currentColor" stroke-width="1.7"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',copy:'<svg viewBox="0 0 24 24" fill="none"><rect x="8" y="8" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" stroke="currentColor" stroke-width="1.7"/></svg>',camera:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 7h3l1.3-2h7.4L17 7h3v12H4V7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.5" stroke="currentColor" stroke-width="1.8"/></svg>',redo:'<svg viewBox="0 0 24 24" fill="none"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 4v7h-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'};
const $=id=>document.getElementById(id);document.querySelectorAll('[data-icon]').forEach(el=>el.innerHTML=ICONS[el.dataset.icon]||'');
let lang=localStorage.getItem('aiway_lang')||'en',auth=JSON.parse(localStorage.getItem('pi_ai_auth')||'null'),current=null,history=[],streaming=false,webSearch=false,controller=null,piReady=false,userProfile=null;
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),3200)}
async function api(url,opt={}){opt.headers={...(opt.headers||{}),'Content-Type':'application/json',...(auth?.token?{Authorization:`Bearer ${auth.token}`}:{})};const r=await fetch(url,opt);const d=await r.json().catch(()=>({}));if(!r.ok){if(r.status===401&&auth){logout(false)}throw Error(d.error||`خطأ ${r.status}`)}return d}
const I18N={en:{tagline:'AI for everyone',newChat:'New chat',chats:'Chats',guest:'Guest',signPi:'Sign in with Pi',login:'Sign in',connected:'Connected',balance:'Balance',webSearch:'Web search',buyBalance:'Buy balance with Pi',choosePack:'Choose a package. Pi is the primary payment currency.',allModels:'All models unlocked',trial:n=>`Free trial: ${n} messages left`},ar:{tagline:'ذكاء اصطناعي للجميع',newChat:'محادثة جديدة',chats:'المحادثات',guest:'زائر',signPi:'سجّل الدخول بحساب Pi',login:'دخول',connected:'متصل',balance:'الرصيد',webSearch:'بحث الويب',buyBalance:'شراء رصيد بعملة Pi',choosePack:'اختر الباقة المناسبة. عملة Pi هي عملة الدفع الأساسية.',allModels:'جميع النماذج مفتوحة',trial:n=>`تجربة مجانية: ${n} رسائل متبقية`}};
function applyLanguage(){document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=I18N[lang][el.dataset.i18n]||el.textContent);$('languageLabel').textContent=lang==='en'?'العربية':'English';$('prompt').placeholder=lang==='ar'?'اسأل أي شيء...':'Ask anything...';renderPackages();if(auth){refreshMe().catch(()=>{});loadChats().catch(()=>{})}else{$('profileName').textContent=I18N[lang].guest;$('profileState').textContent=I18N[lang].signPi;$('loginBtn').querySelector('span:last-child').textContent=I18N[lang].login}render()}
function toggleLanguage(){lang=lang==='en'?'ar':'en';localStorage.setItem('aiway_lang',lang);applyLanguage();render()}
async function deleteChat(id){const ok=confirm(lang==='ar'?'هل تريد حذف هذه الدردشة نهائيًا؟':'Delete this chat permanently?');if(!ok)return;await api('/api/conversations?id='+encodeURIComponent(id),{method:'DELETE'});if(current===id){current=null;history=[];render()}await loadChats();toast(lang==='ar'?'تم حذف الدردشة':'Chat deleted')}
function initPi(){let tries=0;const timer=setInterval(()=>{tries++;if(window.Pi?.init){clearInterval(timer);try{Pi.init({version:'2.0',sandbox:false});piReady=true;$('profileState').textContent=auth?(lang==='ar'?'متصل بحساب Pi':'Connected with Pi'):(lang==='ar'?'جاهز لتسجيل الدخول':'Ready to sign in')}catch(e){console.error(e)}}else if(tries>30){clearInterval(timer);$('profileState').textContent=lang==='ar'?'افتح الموقع داخل Pi Browser':'Open this site in Pi Browser'}},150)}
function renderModelSelect(selected=''){
  const select=$('model');
  const models=window.aiwayModels||[];
  if(!models.length){
    select.innerHTML=`<option value="">${lang==='ar'?'لا توجد نماذج متاحة':'No models available'}</option>`;
    return;
  }
  const preferred=selected&&models.some(m=>m.id===selected&&!m.locked)
    ? selected
    : (models.find(m=>m.trial&&!m.locked)||models.find(m=>!m.locked)||models[0]).id;
  select.innerHTML=models.map(m=>`<option value="${esc(m.id)}" ${m.locked?'disabled':''}>${esc(m.name||m.id)}${m.locked?(lang==='ar'?' — مقفول':' — Locked'):''}</option>`).join('');
  select.value=preferred;
}
async function loadModels(){
  const selected=$('model').value;
  const data=await api('/api/models');
  window.aiwayPackages=data.packages||{};
  window.aiwayModels=data.models||[];
  renderModelSelect(selected||data.trialModelId||'');
  renderPackages();
  return data;
}
async function init(){applyLanguage();initPi();try{await loadModels()}catch(e){toast(e.message)}render();if(auth){try{await refreshMe();await loadModels();await loadChats()}catch(e){toast(lang==='ar'?'انتهت الجلسة، سجّل الدخول من جديد':'Session expired. Please sign in again.')}}}

async function recoverIncompletePayment(payment,{silent=false}={}){
  const paymentId=payment?.identifier||payment?.paymentId||payment?.id;
  const txid=payment?.transaction?.txid||payment?.txid;
  const packageId=payment?.metadata?.packageId||payment?.metadata?.package_id;
  if(!paymentId){if(!silent)toast(lang==='ar'?'لم يتم العثور على معرّف الدفعة':'Payment ID was not found');return false}
  try{
    await api('/api/payment-complete',{method:'POST',body:JSON.stringify({paymentId,txid:txid||null,packageId:packageId||null,recover:true})});
    await Promise.all([refreshMe(),loadModels()]);
    if(!silent)toast(lang==='ar'?'تم إنهاء الدفعة المعلقة وإضافة الرصيد':'Pending payment completed and balance added');
    return true;
  }catch(e){
    console.warn('Incomplete payment recovery:',e);
    if(!silent)toast(e.message||(lang==='ar'?'تعذر إنهاء الدفعة المعلقة':'Could not complete the pending payment'));
    return false;
  }
}
async function authenticatePiForPayments({refreshSession=true,silentRecovery=true}={}){if(!piReady||!window.Pi?.authenticate)throw Error('افتح الموقع من Pi Browser وانتظر تحميل Pi SDK');let recovered=0;const result=await Pi.authenticate(['username','payments'],async payment=>{if(await recoverIncompletePayment(payment,{silent:silentRecovery}))recovered++});if(!result?.accessToken)throw Error('لم يرجع Pi رمز الدخول');if(refreshSession){const data=await api('/api/pi-login',{method:'POST',body:JSON.stringify({accessToken:result.accessToken,user:result.user||null})});auth=data;localStorage.setItem('pi_ai_auth',JSON.stringify(auth))}return {result,recovered}}
async function login(){if(auth)return toast(lang==='ar'?'أنت مسجل بالفعل':'You are already signed in');const btn=$('loginBtn');btn.disabled=true;btn.querySelector('span:last-child').textContent=lang==='ar'?'جارٍ الدخول':'Signing in…';$('profileState').innerHTML='<span class="loading-dot"></span> <span class="loading-dot"></span> <span class="loading-dot"></span>';try{await authenticatePiForPayments({refreshSession:true,silentRecovery:true});await Promise.all([refreshMe(),loadModels(),loadChats()]);toast(userProfile?.has_purchased?(lang==='ar'?'تم تسجيل الدخول بنجاح':'Signed in successfully'):(lang==='ar'?`مرحبًا بك — لديك ${userProfile?.trial_messages_remaining||0} رسائل مجانية على DeepSeek V3`:`Welcome — you have ${userProfile?.trial_messages_remaining||0} free DeepSeek V3 messages`))}catch(e){console.error(e);$('profileState').textContent=lang==='ar'?'تعذر تسجيل الدخول':'Could not sign in';toast(e.message||(lang==='ar'?'فشل تسجيل الدخول بحساب Pi':'Pi sign-in failed'))}finally{btn.disabled=false;btn.querySelector('span:last-child').textContent=auth?I18N[lang].connected:I18N[lang].login}}
function logout(show=true){auth=null;userProfile=null;current=null;history=[];localStorage.removeItem('pi_ai_auth');$('profileName').textContent=I18N[lang].guest;$('profileState').textContent=I18N[lang].signPi;$('credits').textContent='0';$('chats').innerHTML='';$('loginBtn').querySelector('span:last-child').textContent=I18N[lang].login;render();if(show)toast(lang==='ar'?'تم تسجيل الخروج':'Signed out')}
async function refreshMe(){const d=await api('/api/me');userProfile=d.user;$('profileName').textContent='@'+d.user.username;$('profileState').textContent=d.user.has_purchased?'جميع النماذج مفتوحة':`تجربة مجانية: ${d.user.trial_messages_remaining} رسائل متبقية`;$('userAvatar').textContent=(d.user.username||'π').slice(0,1).toUpperCase();$('credits').textContent=Number(d.user.ai_tokens||0).toLocaleString('en-US');$('loginBtn').querySelector('span:last-child').textContent='متصل'}
async function loadChats(){const d=await api('/api/conversations');$('chats').innerHTML=(d.conversations||[]).map(c=>`<div class="chat-item ${c.id===current?'active':''}" data-id="${c.id}">${ICONS.chat}<span>${esc(c.title)}</span><button class="chat-delete" data-delete="${c.id}" title="${lang==='ar'?'حذف الدردشة':'Delete chat'}">×</button></div>`).join('');$('chats').querySelectorAll('.chat-item').forEach(b=>b.onclick=e=>{if(!e.target.closest('[data-delete]'))openChat(b.dataset.id)});$('chats').querySelectorAll('[data-delete]').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteChat(b.dataset.delete)})}
async function newChat(){if(!auth)return login();const d=await api('/api/conversations',{method:'POST',body:JSON.stringify({title:lang==='ar'?'محادثة جديدة':'New chat',modelId:$('model').value})});current=d.conversation.id;history=[];render();await loadChats();closeMenu()}

function welcome(){const en=lang==='en';return `<div class="welcome"><div class="hero-icon"><img src="/aiway-logo.png" alt="AiWay"></div><h1>${en?'How can I help you today?':'كيف أقدر أساعدك اليوم؟'}</h1><p>${en?'Choose the right AI model and ask in English, Arabic, or any language. Your conversations are stored securely in your account.':'اختر نموذج الذكاء الاصطناعي المناسب، واسأل بالعربية أو بأي لغة. محادثاتك محفوظة بأمان في حسابك.'}</p><div class="suggestions"><button class="suggestion" data-prompt="${en?'Create a practical marketing plan for a startup':'اكتب لي خطة تسويق عملية لمشروع ناشئ'}"><span class="sicon">${ICONS.sparkles}</span><span><b>${en?'Marketing plan':'خطة تسويق'}</b><small>${en?'A clear, actionable strategy':'استراتيجية واضحة قابلة للتنفيذ'}</small></span></button><button class="suggestion" data-prompt="${en?'Help me write and debug JavaScript code':'ساعدني في كتابة وتصحيح كود JavaScript'}"><span class="sicon">${ICONS.bot}</span><span><b>${en?'Coding help':'مساعدة برمجية'}</b><small>${en?'Code, explanations, and debugging':'كود، شرح، وتصحيح أخطاء'}</small></span></button><button class="suggestion" data-prompt="${en?'Summarize the following text into clear bullet points: ':'لخص لي النص التالي في نقاط واضحة: '}"><span class="sicon">${ICONS.chat}</span><span><b>${en?'Summarize text':'تلخيص النصوص'}</b><small>${en?'A fast, organized summary':'ملخص سريع ومنظم'}</small></span></button><button class="suggestion" data-prompt="${en?'Suggest digital business ideas for my market':'اقترح أفكار مشاريع رقمية مناسبة للسوق العربي'}"><span class="sicon">${ICONS.coin}</span><span><b>${en?'Business ideas':'أفكار مشاريع'}</b><small>${en?'Creative opportunities tailored to you':'فرص مبتكرة تناسب اهتماماتك'}</small></span></button></div></div>`}


function enhanceCodeBlocks(root=$('messages')){
  root.querySelectorAll('pre').forEach(pre=>{
    if(pre.dataset.enhanced)return;
    pre.dataset.enhanced='1';
    const code=pre.querySelector('code');
    const match=(code?.className||'').match(/language-([\w+-]+)/);
    const language=match?.[1]||'code';
    const head=document.createElement('div');
    head.className='code-head';
    const label=document.createElement('span');
    label.textContent=language;
    const button=document.createElement('button');
    button.type='button';
    button.className='code-copy';
    button.textContent=lang==='ar'?'نسخ':'Copy';
    button.onclick=async()=>{
      try{
        await navigator.clipboard.writeText(code?.textContent||pre.textContent||'');
        button.textContent=lang==='ar'?'تم النسخ':'Copied';
        setTimeout(()=>button.textContent=lang==='ar'?'نسخ':'Copy',1300);
      }catch{toast(lang==='ar'?'تعذر نسخ الكود':'Could not copy code')}
    };
    head.append(label,button);
    pre.prepend(head);
  });
}
function bindMessageActions(){
  $('messages').querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copyMsg(Number(b.dataset.copy)));
  $('messages').querySelectorAll('[data-redo]').forEach(b=>b.onclick=regenerate);
  enhanceCodeBlocks();
}
function attachmentMarkup(m){
  const list=m.attachments||[];
  if(!list.length)return '';
  return `<div class="message-attachments">${list.map(a=>`<span class="message-attachment">${a.type?.startsWith('image/')?(lang==='ar'?'صورة':'Image'):(lang==='ar'?'ملف':'File')}: ${esc(a.name||'')}</span>`).join('')}</div>`;
}
function imageMarkup(m,i){
  const img=m.generatedImage;
  if(!img?.thumbnail_data)return '';
  return `<div class="generated-image-card"><img src="${esc(img.thumbnail_data)}" alt="${lang==='ar'?'صورة مولدة':'Generated image'}"><div class="generated-image-actions"><span>${esc(img.model_id||'AI image')}</span><button type="button" class="download-image" data-download-image="${i}">${lang==='ar'?'تنزيل الصورة':'Download image'}</button></div></div>`;
}
function render(){if(!history.length){$('messages').innerHTML=welcome();$('messages').querySelectorAll('[data-prompt]').forEach(b=>b.onclick=()=>{$('prompt').value=b.dataset.prompt;$('prompt').focus();autoSize()});return}$('messages').innerHTML=history.map((m,i)=>`<article class="msg ${m.role}" data-message-index="${i}"><span class="avatar">${m.role==='user'?ICONS.user:ICONS.bot}</span><div class="bubble">${attachmentMarkup(m)}<div class="bubble-content">${m.role==='assistant'?(m.content?(window.marked?marked.parse(m.content):esc(m.content).replace(/\n/g,'<br>')):(streaming&&i===history.length-1?'<div class="thinking-wrap"><span class="thinking-spinner"></span><span>يفكر</span><span class="thinking-dots"><i></i><i></i><i></i></span></div>':'')):esc(m.content||'').replace(/\n/g,'<br>')}</div>${imageMarkup(m,i)}<div class="msg-actions"><button class="mini-btn" data-copy="${i}">${ICONS.copy} نسخ</button>${m.role==='assistant'?`<button class="mini-btn" data-redo="1">${ICONS.redo} إعادة</button>`:''}</div></div></article>`).join('');bindMessageActions();$('messages').querySelectorAll('[data-download-image]').forEach(b=>b.onclick=()=>downloadGeneratedImage(Number(b.dataset.downloadImage)));requestAnimationFrame(()=>$('messages').scrollTop=$('messages').scrollHeight)}
let streamFrame=0;
function updateStreamingBubble(){if(streamFrame)return;streamFrame=requestAnimationFrame(()=>{streamFrame=0;const article=$('messages').querySelector(`[data-message-index="${history.length-1}"]`);const content=article?.querySelector('.bubble-content');if(!content)return;article.classList.add('streaming-msg');content.classList.add('streaming');content.textContent=history.at(-1)?.content||'';const box=$('messages');if(box.scrollHeight-box.scrollTop-box.clientHeight<220)box.scrollTop=box.scrollHeight})}

let pendingAttachments=[];
const MAX_FILE_BYTES=3*1024*1024,MAX_TOTAL_BYTES=4*1024*1024,MAX_ATTACHMENTS=3;
function dbOpen(){return new Promise((resolve,reject)=>{const q=indexedDB.open('aiway-local-files',1);q.onupgradeneeded=()=>q.result.createObjectStore('files',{keyPath:'id'});q.onsuccess=()=>resolve(q.result);q.onerror=()=>reject(q.error)})}
async function saveLocalAttachment(a){try{const d=await dbOpen(),tx=d.transaction('files','readwrite');tx.objectStore('files').put(a);await new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=()=>j(tx.error)});d.close()}catch{}}
function fileToDataUrl(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>reject(r.error);r.readAsDataURL(file)})}
async function compressImage(file){const url=await fileToDataUrl(file);return new Promise(resolve=>{const img=new Image();img.onload=()=>{const max=1600,scale=Math.min(1,max/Math.max(img.width,img.height)),c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',.82))};img.onerror=()=>resolve(url);img.src=url})}
async function addFiles(files){for(const file of [...files]){if(pendingAttachments.length>=MAX_ATTACHMENTS){toast('الحد الأقصى 3 ملفات في الرسالة');break}if(file.size>MAX_FILE_BYTES){toast(`الملف ${file.name} أكبر من 3MB`);continue}const current=pendingAttachments.reduce((n,a)=>n+(a.size||0),0);if(current+file.size>MAX_TOTAL_BYTES){toast('إجمالي الملفات يجب ألا يتجاوز 4MB');break}const isImage=file.type.startsWith('image/');const dataUrl=isImage?await compressImage(file):await fileToDataUrl(file);const item={id:crypto.randomUUID(),name:file.name,type:file.type||'application/octet-stream',size:file.size,dataUrl,createdAt:Date.now()};pendingAttachments.push(item);saveLocalAttachment(item)}renderAttachmentStrip();$('fileInput').value=''}
function renderAttachmentStrip(){const box=$('attachmentStrip');box.classList.toggle('show',pendingAttachments.length>0);box.innerHTML=pendingAttachments.map((a,i)=>`<div class="attachment-chip">${a.type.startsWith('image/')?`<img src="${a.dataUrl}" alt="">`:ICONS.chat}<span>${esc(a.name)}</span><button class="remove-attachment" data-remove-attachment="${i}">×</button></div>`).join('');box.querySelectorAll('[data-remove-attachment]').forEach(b=>b.onclick=()=>{pendingAttachments.splice(Number(b.dataset.removeAttachment),1);renderAttachmentStrip()})}
function isImageRequest(text){return /(?:اعمل|أنشئ|ارسم|ولد|صمم|generate|create|draw)\s+(?:لي\s+)?(?:صورة|image|photo|poster|logo)/i.test(text)}
async function downloadGeneratedImage(i){const img=history[i]?.generatedImage;if(!img?.thumbnail_data)return toast('الصورة غير متاحة');try{const r=await fetch(img.thumbnail_data),blob=await r.blob(),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`AiWay-${Date.now()}.${blob.type.includes('png')?'png':'jpg'}`;a.style.display='none';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},1200)}catch{toast('تعذر تنزيل الصورة')}}
async function generateImageMessage(text,attachments){history.push({role:'assistant',content:'',generatedImage:null});render();const r=await api('/api/image',{method:'POST',body:JSON.stringify({conversationId:current,prompt:text,referenceImage:attachments.find(a=>a.type.startsWith('image/'))?.dataUrl||null})});history[history.length-1]={role:'assistant',content:'تم إنشاء الصورة المطلوبة.',generatedImage:r.image};render();await Promise.all([refreshMe(),loadChats()])}

async function sendMessage(){
  if(streaming){controller?.abort();return}
  try{
    if(!auth){await login();return}
    const text=$('prompt').value.trim();
    if(!text&&!pendingAttachments.length){toast(lang==='ar'?'اكتب رسالة أولًا':'Write a message first');return}
    let modelId=$('model').value;
    if(!modelId){
      await loadModels();
      modelId=$('model').value;
      if(!modelId)throw Error(lang==='ar'?'تعذر تحميل نموذج الذكاء الاصطناعي':'Could not load an AI model');
    }
    if(!current){
      const d=await api('/api/conversations',{method:'POST',body:JSON.stringify({title:lang==='ar'?'محادثة جديدة':'New chat',modelId})});
      current=d.conversation.id;
    }
    const sentAttachments=pendingAttachments.map(({name,type,size,dataUrl})=>({name,type,size,dataUrl}));
    pendingAttachments=[];renderAttachmentStrip();streaming=true;controller=new AbortController();
    history.push({role:'user',content:text||(lang==='ar'?'حلل الملفات المرفقة':'Analyze the attached files'),attachments:sentAttachments});
    $('prompt').value='';autoSize();render();$('status').textContent='';$('sendBtn').classList.add('sending');$('sendBtn').innerHTML=ICONS.stop;
    if(isImageRequest(text)){await generateImageMessage(text,sentAttachments);return}
    history.push({role:'assistant',content:''});render();
    const r=await fetch('/api/chat',{method:'POST',signal:controller.signal,headers:{'Content-Type':'application/json',Authorization:`Bearer ${auth.token}`},body:JSON.stringify({conversationId:current,modelId,messages:history.slice(0,-1),temperature:.7,webSearch,attachments:sentAttachments})});
    if(!r.ok){const d=await r.json().catch(()=>({}));throw Error(d.error||(lang==='ar'?'فشل إرسال الرسالة':'Failed to send message'))}
    if(!r.body)throw Error(lang==='ar'?'المتصفح لا يدعم بث الرد':'This browser does not support response streaming');
    const reader=r.body.getReader(),decoder=new TextDecoder();let buffer='';
    while(true){const {done,value}=await reader.read();if(done)break;buffer+=decoder.decode(value,{stream:true});const parts=buffer.split('\n\n');buffer=parts.pop()||'';for(const part of parts){const line=part.split('\n').find(x=>x.startsWith('data:'));if(!line)continue;const d=JSON.parse(line.slice(5));if(d.type==='delta'){history[history.length-1].content+=d.text;updateStreamingBubble()}if(d.type==='error')throw Error(d.error)}}
    render();await Promise.all([refreshMe(),loadChats()]);
  }catch(e){
    if(e.name==='AbortError'){if(!history.at(-1)?.content)history.pop();toast(lang==='ar'?'تم إيقاف الإجابة':'Response stopped')}
    else{if(history.at(-1)?.role==='assistant'&&!history.at(-1)?.content)history.at(-1).content=(lang==='ar'?'حدث خطأ: ':'Error: ')+e.message;toast(e.message||(lang==='ar'?'تعذر إرسال الرسالة':'Could not send message'))}
    render();
  }finally{
    streaming=false;controller=null;$('status').textContent='';$('sendBtn').classList.remove('sending');$('sendBtn').innerHTML=ICONS.send;
  }
}
function regenerate(){if(streaming)return;const idx=[...history].map(x=>x.role).lastIndexOf('user');if(idx<0)return;const text=history[idx].content;history=history.slice(0,idx);$('prompt').value=text;sendMessage()}
function copyMsg(i){navigator.clipboard?.writeText(history[i]?.content||'').then(()=>toast('تم النسخ')).catch(()=>toast('تعذر النسخ'))}
function exportChat(){if(!history.length)return toast('لا توجد محادثة لتصديرها');const text=history.map(m=>`${m.role==='user'?'أنت':'AiWay'}:\n${m.content}`).join('\n\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='pi-ai-chat.txt';a.click();URL.revokeObjectURL(a.href)}
function toggleWeb(){if(userProfile&&!userProfile.has_purchased)return toast('بحث الويب يُفتح بعد أول عملية شراء');webSearch=!webSearch;$('webPill').classList.toggle('on',webSearch);toast(webSearch?'تم تفعيل بحث الويب':'تم إيقاف بحث الويب')}
function openPay(){if(!auth)return login();$('payModal').classList.add('open')}
function renderPackages(){const box=document.querySelector('.packs');if(!box||!window.aiwayPackages)return;const labels=lang==='ar'?{starter:'أساسية',plus:'الأكثر توفيرًا',pro:'احترافية'}:{starter:'Starter',plus:'Best value',pro:'Pro'};box.innerHTML=Object.entries(window.aiwayPackages).map(([id,p])=>`<div class="pack ${id==='plus'?'featured':''}"><small>${labels[id]||id}</small><b>${Number(p.tokens).toLocaleString()}</b><small>AiWay Tokens</small><span class="pi-estimate">${p.amountPi?Number(p.amountPi).toFixed(3):'--'} Pi</span><span class="usd-note">≈ $${p.usd}</span><button class="btn ${id==='plus'?'primary':'soft'}" onclick="buy('${id}')">${lang==='ar'?'شراء بـ Pi':'Buy with Pi'}</button></div>`).join('')}
async function buy(packageId){if(!piReady||!window.Pi?.createPayment)return toast('الدفع متاح داخل Pi Browser فقط');const pkg=window.aiwayPackages?.[packageId];if(!pkg?.amountPi)return toast('تعذر جلب سعر Pi من OKX الآن');$('payModal').classList.remove('open');try{await authenticatePiForPayments({refreshSession:true,silentRecovery:true});await Pi.createPayment({amount:pkg.amountPi,memo:`شراء ${pkg.tokens.toLocaleString()} AiWay Tokens بقيمة $${pkg.usd}`,metadata:{packageId,usd:pkg.usd,tokens:pkg.tokens,piUsd:pkg.piUsd}}, {onReadyForServerApproval:paymentId=>api('/api/payment-approve',{method:'POST',body:JSON.stringify({paymentId,packageId})}),onReadyForServerCompletion:async(paymentId,txid)=>{await api('/api/payment-complete',{method:'POST',body:JSON.stringify({paymentId,txid,packageId})});await Promise.all([refreshMe(),loadModels()]);toast('تمت إضافة الرصيد وفتح جميع النماذج بنجاح')},onCancel:()=>toast('تم إلغاء الدفع'),onError:e=>toast(e?.message||'حدث خطأ في الدفع')})}catch(e){toast(e.message||'تعذر بدء الدفع')}}
function autoSize(){const t=$('prompt');t.style.height='auto';t.style.height=Math.min(t.scrollHeight,180)+'px'}function closeMenu(){$('sidebar').classList.remove('open');$('backdrop').classList.remove('open')}
$('model').onchange=()=>{const chosen=(window.aiwayModels||[]).find(x=>x.id===$('model').value);if(chosen?.locked){toast('هذا النموذج يُفتح بعد أول عملية شراء');renderModelSelect('')} };$('newChatBtn').onclick=newChat;$('loginBtn').onclick=()=>auth?logout():login();$('payBtn').onclick=openPay;$('languageBtn').onclick=toggleLanguage;$('menuBtn').onclick=()=>{$('sidebar').classList.add('open');$('backdrop').classList.add('open')};$('backdrop').onclick=closeMenu;$('exportBtn').onclick=exportChat;$('webPill').onclick=toggleWeb;$('attachBtn').onclick=()=>$('fileInput').click();$('fileInput').onchange=e=>addFiles(e.target.files);$('sendBtn').onclick=sendMessage;$('prompt').oninput=autoSize;$('prompt').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}};$('closePay').onclick=()=>$('payModal').classList.remove('open');$('payModal').onclick=e=>{if(e.target===$('payModal'))$('payModal').classList.remove('open')};document.querySelectorAll('.buy').forEach(b=>b.onclick=()=>buy(b.dataset.pack));function syncViewportHeight(){const vv=window.visualViewport;const h=vv?vv.height:window.innerHeight;document.documentElement.style.setProperty('--app-height',Math.round(h)+'px')}syncViewportHeight();window.addEventListener('resize',syncViewportHeight,{passive:true});window.addEventListener('orientationchange',()=>setTimeout(syncViewportHeight,120),{passive:true});if(window.visualViewport){window.visualViewport.addEventListener('resize',syncViewportHeight,{passive:true});window.visualViewport.addEventListener('scroll',syncViewportHeight,{passive:true})}window.addEventListener('DOMContentLoaded',init);
</script>
